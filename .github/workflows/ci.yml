name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# CI 产物写入 Release 与 Artifact 所需权限
permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: 静态分析 + 单元测试
  # ============================================================
  analyze-and-test:
    name: Analyze & Test (Flutter)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: md3Music

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # 不固定 Flutter 版本：pubspec.yaml 要求 Dart SDK ^3.12.0，
          # 而 Flutter 3.12.x 只提供 Dart 3.3.x（版本号歧义）。
          # 使用最新 stable 以确保能提供 Dart 3.12+。
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Fetch pub dependencies
        run: flutter pub get

      - name: Verify no banned dependencies（TTML / WebView / xml 包）
        run: |
          set -e
          echo "==> 检查 pubspec.yaml 是否引入了 TTML / WebView / xml 等不应有的依赖"
          if grep -Ei "^\s*(xml|webview_flutter|flutter_inappwebview):" pubspec.yaml; then
            echo "❌ 检测到禁用依赖"; exit 1
          else
            echo "✅ 未发现禁用依赖"
          fi

      - name: Verify no banned symbols in lib/
        run: |
          set -e
          echo "==> 检查 lib/ 下是否出现 TTML / WebView / package:xml 引用"
          if grep -rEn "TTML|ttml|WebView|webview_flutter|package:xml" lib/; then
            echo "❌ lib/ 下检测到禁用符号"; exit 1
          else
            echo "✅ lib/ 下未发现禁用符号"
          fi

      - name: flutter analyze
        # --no-fatal-infos：info 级别（如 avoid_print）不导致 CI 失败，
        # 仅 error 与 warning 会中断流水线。项目存在大量调试 print，待逐步替换为 logger。
        run: flutter analyze --no-fatal-infos

      - name: dart format --set-exit-if-changed (report only)
        continue-on-error: true
        run: dart format --set-exit-if-changed lib/ test/

      - name: Run unit tests
        # --machine：输出 JSON Lines（机器可读），供 dorny/test-reporter
        # 的 flutter-json reporter 解析为 PR Check。
        # 重定向到 test_output.json，不污染 CI 日志。
        run: flutter test --coverage --machine > test_output.json

      - name: Upload coverage to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: md3Music/coverage/
          if-no-files-found: ignore

      - name: Publish test report to PR check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Flutter Test Results
          path: 'md3Music/test_output.json'
          reporter: flutter-json
          path-replace-backslashes: true

  # ============================================================
  # Job 2: 构建 Release APK（split-per-abi）
  # ============================================================
  build-apk:
    name: Build APK (${{ matrix.abi }})
    needs: analyze-and-test
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    defaults:
      run:
        working-directory: md3Music

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # packages 参数必须单行空格分隔；多行（|）会被 sdkmanager
          # 当作单个包名（含换行符）导致 "Failed to find package"。
          packages: 'ndk;28.2.13676358 cmake;3.22.1'

      - name: Print toolchain versions
        run: |
          flutter --version
          echo "--- NDK ---"
          ls "$ANDROID_NDK_HOME" || true
          echo "--- CMAKE ---"
          ls "$ANDROID_HOME/cmake/3.22.1/bin" || true

      - name: Fetch pub dependencies
        run: flutter pub get

      - name: Download nodejs-mobile native libs (libnode.so)
        shell: bash
        run: |
          set -e
          echo "==> 上游 zzyoxml/md3Music Release 未发布 native-libs.zip"
          echo "==> 改为从上游 Release APK 提取 libnode.so，并从 nodejs.org 下载 v18 头文件"
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64

          # 下载 3 个 APK 并提取 lib/<abi>/libnode.so
          for abi in arm64-v8a armeabi-v7a x86_64; do
            echo "==> 下载 app-${abi}-release.apk"
            curl -L --fail -o "app-${abi}.apk" \
              "https://github.com/zzyoxml/md3Music/releases/latest/download/app-${abi}-release.apk"
            echo "==> 提取 lib/${abi}/libnode.so"
            unzip -j "app-${abi}.apk" "lib/${abi}/libnode.so" \
              -d "android/app/src/main/jniLibs/${abi}/"
            ls -la "android/app/src/main/jniLibs/${abi}/"
            rm "app-${abi}.apk"
          done

          # 下载 Node.js v18 头文件（nodejs-mobile 基于 Node.js 18）
          # tarball 结构：node-v18.20.4/include/node/{node.h, cpp/, openssl/, uv/, ...}
          # 之前用 --strip-components=1 提取到 cpp/include/node/ 会得到
          # cpp/include/node/include/node/node.h（路径错误），导致 CMake 找不到 node.h。
          # 改为：先解压到 /tmp，再把 include/node/ 子目录复制到目标位置。
          echo "==> 下载 Node.js v18 头文件"
          mkdir -p /tmp/node-headers
          curl -L --fail \
            "https://nodejs.org/dist/v18.20.4/node-v18.20.4-headers.tar.gz" \
            | tar xz -C /tmp/node-headers
          mkdir -p android/app/src/main/cpp/include
          cp -r /tmp/node-headers/node-v18.20.4/include/node \
            android/app/src/main/cpp/include/

          echo "==> 校验 jniLibs 与 cpp/include"
          ls android/app/src/main/jniLibs/*/
          ls android/app/src/main/cpp/include/node/node.h

      - name: Build APK for ${{ matrix.abi }}
        run: |
          flutter build apk --release --split-per-abi --target-platform android-${{ matrix.abi == 'arm64-v8a' && 'arm64' || matrix.abi == 'armeabi-v7a' && 'arm' || 'x64' }}

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p artifacts
          APK_PATH="build/app/outputs/flutter-apk/app-${{ matrix.abi }}-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "md3music-${{ matrix.abi }}-release.apk"
            cp "$APK_PATH" "artifacts/md3music-${{ matrix.abi }}-release.apk"
            ls -la "md3music-${{ matrix.abi }}-release.apk"
          else
            echo "❌ APK 不存在: $APK_PATH"; exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: md3music-apk-${{ matrix.abi }}
          path: md3Music/md3music-${{ matrix.abi }}-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to Release（tag 触发时）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          files: md3Music/md3music-${{ matrix.abi }}-release.apk
          name: Release ${{ github.ref_name }}

  # ============================================================
  # Job 3: 构建 Profile APK（v8a only，真机性能分析用）
  # ============================================================
  # Profile 模式 = AOT 编译（与 release 同性能）+ 保留 DevTools / Performance overlay。
  # 用于真机性能诊断：装上后开发者选项打开「GPU 呈现模式分析」即可看每帧耗时。
  build-profile-apk:
    name: Build Profile APK (arm64-v8a)
    needs: analyze-and-test
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        working-directory: md3Music

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;28.2.13676358 cmake;3.22.1'

      - name: Fetch pub dependencies
        run: flutter pub get

      - name: Download nodejs-mobile native libs (libnode.so)
        shell: bash
        run: |
          set -e
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64

          # 仅需 arm64-v8a 的 libnode.so，但 CMake 要求三个 ABI 都存在
          for abi in arm64-v8a armeabi-v7a x86_64; do
            curl -L --fail -o "app-${abi}.apk" \
              "https://github.com/zzyoxml/md3Music/releases/latest/download/app-${abi}-release.apk"
            unzip -j "app-${abi}.apk" "lib/${abi}/libnode.so" \
              -d "android/app/src/main/jniLibs/${abi}/"
            rm "app-${abi}.apk"
          done

          # Node.js v18 头文件（tarball 结构：node-v18.20.4/include/node/...）
          mkdir -p /tmp/node-headers
          curl -L --fail \
            "https://nodejs.org/dist/v18.20.4/node-v18.20.4-headers.tar.gz" \
            | tar xz -C /tmp/node-headers
          mkdir -p android/app/src/main/cpp/include
          cp -r /tmp/node-headers/node-v18.20.4/include/node \
            android/app/src/main/cpp/include/

      - name: Build Profile APK (arm64-v8a only)
        run: |
          # --profile：AOT 编译 + 保留 Performance overlay / DevTools 连接能力
          # --target-platform android-arm64：只构建 arm64，加速构建
          flutter build apk --profile --target-platform android-arm64

      - name: Rename Profile APK
        shell: bash
        run: |
          mkdir -p artifacts
          APK_PATH="build/app/outputs/flutter-apk/app-profile-arm64-v8a.apk"
          # Profile 模式输出文件名可能是 app-profile.apk 或 app-profile-arm64-v8a.apk
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "md3music-arm64-v8a-profile.apk"
          elif [ -f "build/app/outputs/flutter-apk/app-profile.apk" ]; then
            cp "build/app/outputs/flutter-apk/app-profile.apk" "md3music-arm64-v8a-profile.apk"
          else
            echo "❌ Profile APK 不存在"
            ls -la build/app/outputs/flutter-apk/
            exit 1
          fi
          ls -la "md3music-arm64-v8a-profile.apk"

      - name: Upload Profile APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: md3music-apk-arm64-v8a-profile
          path: md3Music/md3music-arm64-v8a-profile.apk
          if-no-files-found: error
          retention-days: 30

  # ============================================================
  # Job 4: 构建 Debug APK（v8a only，真机调试用）
  # ============================================================
  build-debug-apk:
    name: Build Debug APK (arm64-v8a)
    needs: analyze-and-test
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        working-directory: md3Music

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;28.2.13676358 cmake;3.22.1'

      - name: Fetch pub dependencies
        run: flutter pub get

      - name: Download nodejs-mobile native libs (libnode.so)
        shell: bash
        run: |
          set -e
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64

          for abi in arm64-v8a armeabi-v7a x86_64; do
            curl -L --fail -o "app-${abi}.apk" \
              "https://github.com/zzyoxml/md3Music/releases/latest/download/app-${abi}-release.apk"
            unzip -j "app-${abi}.apk" "lib/${abi}/libnode.so" \
              -d "android/app/src/main/jniLibs/${abi}/"
            rm "app-${abi}.apk"
          done

          mkdir -p /tmp/node-headers
          curl -L --fail \
            "https://nodejs.org/dist/v18.20.4/node-v18.20.4-headers.tar.gz" \
            | tar xz -C /tmp/node-headers
          mkdir -p android/app/src/main/cpp/include
          cp -r /tmp/node-headers/node-v18.20.4/include/node \
            android/app/src/main/cpp/include/

      - name: Build Debug APK (arm64-v8a only)
        run: |
          flutter build apk --debug --target-platform android-arm64

      - name: Rename Debug APK
        shell: bash
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "md3music-arm64-v8a-debug.apk"
            ls -la "md3music-arm64-v8a-debug.apk"
          else
            echo "❌ Debug APK 不存在"
            ls -la build/app/outputs/flutter-apk/
            exit 1
          fi

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: md3music-apk-arm64-v8a-debug
          path: md3Music/md3music-arm64-v8a-debug.apk
          if-no-files-found: error
          retention-days: 30

  # ============================================================
  # Job 5: 汇总打包结果（便于一次性下载全部 ABI）
  # ============================================================
  bundle-apks:
    name: Bundle All APKs
    needs: build-apk
    runs-on: ubuntu-22.04
    if: always() && needs.build-apk.result == 'success'
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: md3music-apk-*
          merge-multiple: true
          path: all-apks

      - name: List & zip
        run: |
          ls -la all-apks/
          cd all-apks && zip -q md3music-all-apks.zip *.apk && ls -la

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: md3music-all-apks
          path: all-apks/md3music-all-apks.zip
          retention-days: 30
