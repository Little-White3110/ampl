name: CI

on:
  push:
    branches: [main, 'feature/download-service-optimization']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_x86_64:
        description: '额外构建 x86_64（模拟器用）'
        type: boolean
        required: false
        default: false

# CI 产物写入 Release 与 Artifact 所需权限
permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: 静态分析 + 单元测试
  # ============================================================
  analyze-and-test:
    name: Analyze & Test (Flutter)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: md3Music

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # 不固定 Flutter 版本：pubspec.yaml 要求 Dart SDK ^3.12.0，
          # 而 Flutter 3.12.x 只提供 Dart 3.3.x（版本号歧义）。
          # 使用最新 stable 以确保能提供 Dart 3.12+。
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Fetch pub dependencies
        run: flutter pub get

      - name: Verify no banned dependencies（TTML / WebView / xml 包）
        run: |
          set -e
          echo "==> 检查 pubspec.yaml 是否引入了 TTML / WebView / xml 等不应有的依赖"
          if grep -Ei "^\s*(xml|webview_flutter|flutter_inappwebview):" pubspec.yaml; then
            echo "❌ 检测到禁用依赖"; exit 1
          else
            echo "✅ 未发现禁用依赖"
          fi

      - name: Verify no banned symbols in lib/
        run: |
          set -e
          echo "==> 检查 lib/ 下是否出现 TTML / WebView / package:xml 引用"
          if grep -rEn "TTML|ttml|WebView|webview_flutter|package:xml" lib/; then
            echo "❌ lib/ 下检测到禁用符号"; exit 1
          else
            echo "✅ lib/ 下未发现禁用符号"
          fi

      - name: flutter analyze
        # --no-fatal-infos：info 级别（如 avoid_print）不导致 CI 失败，
        # 仅 error 与 warning 会中断流水线。项目存在大量调试 print，待逐步替换为 logger。
        run: flutter analyze --no-fatal-infos

      - name: dart format --set-exit-if-changed (report only)
        continue-on-error: true
        run: dart format --set-exit-if-changed lib/ test/

      - name: Run unit tests
        # --machine：输出 JSON Lines（机器可读），供 dorny/test-reporter
        # 的 flutter-json reporter 解析为 PR Check。
        # 重定向到 test_output.json，不污染 CI 日志。
        run: flutter test --coverage --machine > test_output.json

      - name: Upload coverage to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: md3Music/coverage/
          if-no-files-found: ignore

      - name: Publish test report to PR check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Flutter Test Results
          path: 'md3Music/test_output.json'
          reporter: flutter-json
          path-replace-backslashes: true

  # ============================================================
  # Job 2: 构建 Release APK（split-per-abi）
  #
  # 默认只构建 arm64-v8a + armeabi-v7a 两个真机 ABI，
  # 通过 workflow_dispatch 手动触发时勾选 include_x86_64
  # 可额外构建 x86_64（模拟器用）。
  # ============================================================
  build-apk:
    name: Build APK (${{ matrix.abi }})
    needs: analyze-and-test
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # 默认只构建真机 ABI；x86_64 仅在手动触发且勾选时追加
        # 用动态 fromJSON 表达式避免矩阵 expand 产生重复组合
        abi: ${{ (github.event_name == 'workflow_dispatch') && inputs.include_x86_64 && fromJSON('["arm64-v8a","armeabi-v7a","x86_64"]') || fromJSON('["arm64-v8a","armeabi-v7a"]') }}
    defaults:
      run:
        working-directory: md3Music

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # packages 参数必须单行空格分隔；多行（|）会被 sdkmanager
          # 当作单个包名（含换行符）导致 "Failed to find package"。
          packages: 'ndk;28.2.13676358 cmake;3.22.1'

      - name: Print toolchain versions
        run: |
          flutter --version
          echo "--- NDK ---"
          ls "$ANDROID_NDK_HOME" || true
          echo "--- CMAKE ---"
          ls "$ANDROID_HOME/cmake/3.22.1/bin" || true

      - name: Fetch pub dependencies
        run: flutter pub get

      - name: Download nodejs-mobile native libs (libnode.so)
        shell: bash
        run: |
          set -e
          # 上游 zzyoxml/md3Music 在 native-libs Release 发布 native-libs.zip，
          # 内含 jniLibs/<abi>/libnode.so 与 cpp/include/node/*.h。
          # zip 用 Windows 反斜杠路径打包，unzip 会 exit 1，改用 Python zipfile
          # 一步到位：直接读取 zip 内 entry 写到目标位置，不落地到 /tmp。
          ABIS=("arm64-v8a" "armeabi-v7a")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_x86_64 }}" = "true" ]; then
            ABIS+=("x86_64")
          fi
          echo "==> 将下载 native-libs.zip 并提取以下 ABI: ${ABIS[*]}"

          curl -L --fail -o /tmp/native-libs.zip \
            "https://github.com/zzyoxml/md3Music/releases/download/native-libs/native-libs.zip"

          # 用 Python 直接从 zip 提取所需文件到最终位置，避免中间解压环节出错
          python3 << 'PYEOF'
          import zipfile, os, sys
          z = zipfile.ZipFile('/tmp/native-libs.zip')
          names = z.namelist()
          print('==> zip entries (first 20):')
          for n in names[:20]:
              print('  ', n)
          # 处理所有 ABI 的 libnode.so
          abis = ['arm64-v8a', 'armeabi-v7a', 'x86_64']
          for abi in abis:
              # zip 内路径用 forward slash（Python 自动转换 backslash）
              candidate = f'jniLibs/{abi}/libnode.so'
              if candidate in names:
                  dst_dir = f'android/app/src/main/jniLibs/{abi}'
                  os.makedirs(dst_dir, exist_ok=True)
                  dst = f'{dst_dir}/libnode.so'
                  with z.open(candidate) as src, open(dst, 'wb') as out:
                      out.write(src.read())
                  print(f'  ✓ extracted {candidate} -> {dst} ({os.path.getsize(dst)} bytes)')
              else:
                  print(f'  ✗ {candidate} not in zip')
          # 提取 cpp/include/node/*.h 到 android/app/src/main/cpp/include/node/
          node_files = [n for n in names if n.startswith('cpp/include/node/')]
          if not node_files:
              print('  ✗ cpp/include/node/*.h not in zip, fallback to nodejs.org')
              sys.exit(2)
          dst_dir = 'android/app/src/main/cpp/include/node'
          os.makedirs(dst_dir, exist_ok=True)
          for n in node_files:
              # 保留相对路径：cpp/include/node/foo.h -> android/app/src/main/cpp/include/node/foo.h
              rel = n[len('cpp/include/node/'):]
              # 防御 zip slip
              if rel.startswith('/') or '..' in rel:
                  continue
              # 可能是子目录
              dst = os.path.join(dst_dir, rel)
              os.makedirs(os.path.dirname(dst), exist_ok=True)
              with z.open(n) as src, open(dst, 'wb') as out:
                  out.write(src.read())
          print(f'  ✓ extracted {len(node_files)} node headers')
          PYEOF

          # 校验
          echo "==> 校验 jniLibs 与 cpp/include"
          for abi in "${ABIS[@]}"; do
            if [ ! -f "android/app/src/main/jniLibs/${abi}/libnode.so" ]; then
              echo "❌ 未找到 ${abi}/libnode.so"
              exit 1
            fi
            ls -la "android/app/src/main/jniLibs/${abi}/libnode.so"
          done
          if [ ! -f "android/app/src/main/cpp/include/node/node.h" ]; then
            echo "❌ 未找到 cpp/include/node/node.h"
            exit 1
          fi
          ls android/app/src/main/cpp/include/node/node.h

      - name: Build APK for ${{ matrix.abi }}
        run: |
          flutter build apk --release --split-per-abi --target-platform android-${{ matrix.abi == 'arm64-v8a' && 'arm64' || matrix.abi == 'armeabi-v7a' && 'arm' || 'x64' }}

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p artifacts
          APK_PATH="build/app/outputs/flutter-apk/app-${{ matrix.abi }}-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "md3music-${{ matrix.abi }}-release.apk"
            cp "$APK_PATH" "artifacts/md3music-${{ matrix.abi }}-release.apk"
            ls -la "md3music-${{ matrix.abi }}-release.apk"
          else
            echo "❌ APK 不存在: $APK_PATH"; exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: md3music-apk-${{ matrix.abi }}
          path: md3Music/md3music-${{ matrix.abi }}-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to Release（tag 触发时）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          files: md3Music/md3music-${{ matrix.abi }}-release.apk
          name: Release ${{ github.ref_name }}

  # ============================================================
  # Job 3: 汇总打包结果（便于一次性下载全部 ABI）
  # ============================================================
  bundle-apks:
    name: Bundle All APKs
    needs: build-apk
    runs-on: ubuntu-22.04
    if: always() && needs.build-apk.result == 'success'
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: md3music-apk-*
          merge-multiple: true
          path: all-apks

      - name: List & zip
        run: |
          ls -la all-apks/
          cd all-apks && zip -q md3music-all-apks.zip *.apk && ls -la

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: md3music-all-apks
          path: all-apks/md3music-all-apks.zip
          retention-days: 30
